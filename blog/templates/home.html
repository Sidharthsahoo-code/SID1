<!DOCTYPE html>
<html>
<head>
    <title>My Blog</title>
</head>
<body>
    <center>
        <h1>My Blog Website</h1>
        <hr>

        {% for post in posts %}
            <h2>{{ post.title }}</h2>
            <p>{{ post.content }}</p>
            <small>{{ post.created_at }}</small>
            <hr>
        {% empty %}
            <p>No posts yet.</p>
        {% endfor %}
    </center>
</body>
</html>
